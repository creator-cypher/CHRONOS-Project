version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: chronos_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-chronos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chronos_dev_password}
      POSTGRES_DB: ${DB_NAME:-chronos_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chronos} -d ${DB_NAME:-chronos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chronos_network

  # Streamlit Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronos_app
    environment:
      DATABASE_URL: postgresql://${DB_USER:-chronos}:${DB_PASSWORD:-chronos_dev_password}@postgres:5432/${DB_NAME:-chronos_db}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      PYTHONUNBUFFERED: 1
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./Chronos:/app
      - ./data:/app/data
    networks:
      - chronos_network
    command: streamlit run app.py

  # Optional: PgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chronos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - chronos_network

volumes:
  postgres_data:
    driver: local

networks:
  chronos_network:
    driver: bridge
