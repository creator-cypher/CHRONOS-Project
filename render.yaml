# Render.com Deployment — CHRONOS Adaptive Ambient Display System
# ================================================================
# Streamlit Web Application with SQLite Backend
# Images stored on Cloudinary (persistent across restarts).
# User accounts, preferences, and logs stored in SQLite (chronos.db).
#
# ⚠️  NOTE ON DATA PERSISTENCE:
#     Render's free tier uses an ephemeral filesystem.
#     chronos.db is recreated on every redeploy/restart — you will need
#     to re-register your account after each deploy.
#     Images are safe: they live on Cloudinary and are never affected.
#
#     To persist accounts across deploys, upgrade to a paid Render plan
#     and add a Disk mounted at /data — then change the SQLite path in
#     database/postgres_schema.py to /data/chronos.db.
#
# SETUP INSTRUCTIONS:
# ===================
# 1. Connect this repo to Render:
#    - Go to https://dashboard.render.com
#    - Click "New +" → "Web Service"
#    - Connect your GitHub repo (creator-cypher/CHRONOS-Project)
#    - Name: chronos-aura
#    - Runtime: Python
#    - Build Command: pip install -r requirements.txt
#    - Start Command: streamlit run app.py ...  (auto-filled from below)
#    - Plan: Free
#    - Create Service
#
# 2. Set Environment Variables in the web service:
#    - Go to Service Settings → Environment
#    - Add two variables:
#      GEMINI_API_KEY = <your Google Cloud API key>
#      CLOUDINARY_URL = <your Cloudinary URL>
#    - Do NOT set DATABASE_URL — the app will use SQLite automatically
#    - Save & deploy
#
# 3. If DATABASE_URL is already set in Render dashboard, DELETE it.
#    (Environment → find DATABASE_URL → delete it → save)

services:
  - type: web
    name: chronos-aura
    runtime: python
    repo: https://github.com/creator-cypher/CHRONOS-Project
    branch: main
    rootDir: Chronos
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true --server.enableCORS=false
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
