# Render.com Deployment — CHRONOS Adaptive Ambient Display System
# ================================================================
# PostgreSQL-backed Streamlit application
# Images are stored on Cloudinary (persistent across restarts).
# User accounts, preferences, interaction logs, and images stored in PostgreSQL.
#
# Setup Instructions:
#   1. Create a PostgreSQL database on Render dashboard (free tier available)
#   2. Copy the PostgreSQL internal database URL
#   3. Connect this repo on dashboard.render.com (it will auto-detect render.yaml)
#   4. Set these Environment Variables in Render:
#      - GEMINI_API_KEY (get from Google Cloud Console)
#      - CLOUDINARY_URL (get from Cloudinary dashboard)
#      - DATABASE_URL (PostgreSQL internal URL from step 2)
#   5. Deploy

services:
  # Streamlit Web Application with PostgreSQL Backend
  - type: web
    name: chronos-aura
    runtime: python
    repo: https://github.com/creator-cypher/CHRONOS-Project
    branch: main
    rootDir: Chronos
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true --server.enableCORS=false
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: CLOUDINARY_URL
        sync: false          # Set manually in Render dashboard
      - key: DATABASE_URL
        sync: false          # PostgreSQL internal URL from Render dashboard
      - key: PYTHONUNBUFFERED
        value: "1"
