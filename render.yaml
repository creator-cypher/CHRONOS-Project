# Render.com Deployment — CHRONOS Adaptive Ambient Display System
# ================================================================
# Streamlit Web Application with PostgreSQL Backend
# Images stored on Cloudinary (persistent across restarts).
# User accounts, preferences, interaction logs stored in PostgreSQL.
#
# ⚠️  IMPORTANT: Render YAML blueprints don't support PostgreSQL service definitions.
#     Follow the setup steps below BEFORE connecting this repo to Render.
#
# SETUP INSTRUCTIONS:
# ===================
# 1. Create PostgreSQL Database on Render:
#    - Go to https://dashboard.render.com
#    - Click "New +" → "PostgreSQL"
#    - Name: chronos-db
#    - Plan: Free
#    - Create Database
#    - Copy the "Internal Database URL" (not external)
#
# 2. Connect this repo:
#    - Go to https://dashboard.render.com
#    - Click "New +" → "Web Service"
#    - Connect your GitHub repo (creator-cypher/CHRONOS-Project)
#    - Name: chronos-aura
#    - Runtime: Python
#    - Build Command: pip install -r requirements.txt
#    - Start Command: streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true --server.enableCORS=false
#    - Plan: Free
#    - Create Service
#
# 3. Set Environment Variables in the web service:
#    - Go to Service Settings → Environment
#    - Add three variables:
#      GEMINI_API_KEY = <your Google Cloud API key>
#      CLOUDINARY_URL = <your Cloudinary URL>
#      DATABASE_URL = <PostgreSQL Internal URL from step 1>
#    - Save & deploy

services:
  - type: web
    name: chronos-aura
    runtime: python
    repo: https://github.com/creator-cypher/CHRONOS-Project
    branch: main
    rootDir: Chronos
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true --server.enableCORS=false
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
