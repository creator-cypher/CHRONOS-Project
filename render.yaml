# Render.com Deployment — CHRONOS Adaptive Ambient Display System
# ================================================================
# Multi-service deployment: PostgreSQL + Streamlit Web App
# Images stored on Cloudinary (persistent across restarts).
# User accounts, preferences, interaction logs stored in PostgreSQL.
#
# Setup: Just connect this repo to Render dashboard — it auto-creates both services.
# Then set these env vars in the web service:
#   - GEMINI_API_KEY (Google Cloud Console)
#   - CLOUDINARY_URL (Cloudinary dashboard)

services:
  # PostgreSQL Database — Auto-created by Render
  - type: pserv
    name: chronos-db
    runtime: postgresql15
    plan: free

  # Streamlit Web Application
  - type: web
    name: chronos-aura
    runtime: python
    repo: https://github.com/creator-cypher/CHRONOS-Project
    branch: main
    rootDir: Chronos
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true --server.enableCORS=false
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: DATABASE_URL
        fromService:
          name: chronos-db
          type: pserv
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
