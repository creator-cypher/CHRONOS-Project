# Render.com Deployment — CHRONOS Adaptive Ambient Display System
# ================================================================
# Deploy as a Python web service (no Docker, no PostgreSQL needed).
# SQLite database is created automatically on first run.
#
# Usage:
#   1. Connect this repo on dashboard.render.com
#   2. Render auto-detects this file and creates the service
#   3. Set GEMINI_API_KEY in Environment → Add Environment Variable

services:
  - type: web
    name: chronos-aura
    runtime: python
    repo: https://github.com/creator-cypher/CHRONOS-Project
    branch: main
    rootDir: Chronos
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true --server.enableCORS=false
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard — never commit your key
      - key: CLOUDINARY_URL
        sync: false          # Set manually in Render dashboard — never commit your key
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.0"
