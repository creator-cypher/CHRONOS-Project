# Render.com Deployment — CHRONOS Adaptive Ambient Display System
# ================================================================
# Streamlit Web Application
# Images stored on Cloudinary (persistent).
# User accounts, preferences, and logs stored in PostgreSQL (persistent)
# or SQLite (ephemeral — data lost on every restart, local dev only).
#
# DATABASE STRATEGY:
# ==================
#   - DATABASE_URL set  → PostgreSQL (persistent, recommended for production)
#   - DATABASE_URL unset → SQLite on ephemeral disk (data wiped on restart)
#
# SETUP INSTRUCTIONS:
# ===================
# 1. Create a free external PostgreSQL database (one-time):
#    Recommended: https://neon.tech  (free tier, never expires)
#      - Sign up → New Project → copy the connection string
#      - It looks like: postgresql://user:pass@ep-xxx.region.aws.neon.tech/neondb?sslmode=require
#
#    Alternative: https://supabase.com (free tier, 500 MB)
#      - New Project → Settings → Database → Connection string (URI mode)
#
# 2. Connect this repo to Render:
#    - Go to https://dashboard.render.com
#    - Click "New +" → "Web Service"
#    - Connect your GitHub repo (creator-cypher/CHRONOS-Project)
#    - Name: chronos-aura  |  Runtime: Python  |  Plan: Free
#    - Build Command: pip install -r requirements.txt  (auto-filled)
#    - Create Service
#
# 3. Set Environment Variables (Service → Environment):
#    GEMINI_API_KEY  = <your Gemini API key>
#    CLOUDINARY_URL  = <your Cloudinary URL>
#    DATABASE_URL    = <your Neon / Supabase connection string>
#    Save → redeploy.  Tables are created automatically on first start.

services:
  - type: web
    name: chronos-aura
    runtime: python
    repo: https://github.com/creator-cypher/CHRONOS-Project
    branch: main
    rootDir: Chronos
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true --server.enableCORS=false
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
